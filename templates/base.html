<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0NDSMWK4WS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0NDSMWK4WS', {
        // Enhanced configuration
        send_page_view: true,
        cookie_flags: 'SameSite=None;Secure',
        
        // Custom parameters for lead tracking
        custom_map: {
          'lead_score': 'lead_score',
          'visitor_type': 'visitor_type',
          'engagement_level': 'engagement_level',
          'funnel_stage': 'funnel_stage'
        }
      });

      // Initialize lead scoring
      let leadScore = 0;
      let pageViews = 0;
      let startTime = Date.now();
      
      // Track page engagement
      document.addEventListener('DOMContentLoaded', function() {
        pageViews++;
        
        // Track scroll depth
        let maxScroll = 0;
        window.addEventListener('scroll', function() {
          const scrollPercent = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
          if (scrollPercent > maxScroll) {
            maxScroll = scrollPercent;
            
            // Track significant scroll milestones
            if (scrollPercent >= 25 && scrollPercent < 50) {
              gtag('event', 'scroll_depth', {
                event_category: 'Engagement',
                event_label: '25_percent',
                value: scrollPercent
              });
            } else if (scrollPercent >= 50 && scrollPercent < 75) {
              gtag('event', 'scroll_depth', {
                event_category: 'Engagement', 
                event_label: '50_percent',
                value: scrollPercent
              });
            } else if (scrollPercent >= 90) {
              leadScore += 10; // Deep engagement
              gtag('event', 'scroll_depth', {
                event_category: 'Engagement',
                event_label: '90_percent_complete',
                value: scrollPercent,
                lead_score: leadScore
              });
            }
          }
        });
        
        // Track time on page
        setTimeout(function() {
          leadScore += 5;
          gtag('event', 'engagement_time', {
            event_category: 'Engagement',
            event_label: '30_seconds',
            value: 30,
            lead_score: leadScore
          });
        }, 30000);
        
        setTimeout(function() {
          leadScore += 15;
          gtag('event', 'engagement_time', {
            event_category: 'Engagement',
            event_label: '2_minutes',
            value: 120,
            lead_score: leadScore,
            engagement_level: 'high'
          });
        }, 120000);
      });
      
      // Track page exit intent
      window.addEventListener('beforeunload', function() {
        const timeOnPage = Math.round((Date.now() - startTime) / 1000);
        gtag('event', 'page_exit', {
          event_category: 'Engagement',
          event_label: 'session_end',
          value: timeOnPage,
          lead_score: leadScore
        });
      });
    </script>
    
    <!-- Primary Meta Tags -->
    <title>{{ page.title }}</title>
    <meta name="title" content="{{ page.title }}">
    <meta name="description" content="{{ page.description }}">
    <meta name="keywords" content="{{ site.keywords | join(', ') }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{{ page.get('seo', {}).get('og_type', 'website') }}">
    <meta property="og:url" content="{{ site.url }}{{ page.get('seo', {}).get('canonical', '/') }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description }}">
    {% if page.get('seo', {}).get('og_image') %}
    <meta property="og:image" content="{{ page.seo.og_image }}">
    {% endif %}
    
    <!-- Twitter -->
    <meta property="twitter:card" content="{{ page.get('seo', {}).get('twitter_card', 'summary_large_image') }}">
    <meta property="twitter:url" content="{{ site.url }}{{ page.get('seo', {}).get('canonical', '/') }}">
    <meta property="twitter:title" content="{{ page.title }}">
    <meta property="twitter:description" content="{{ page.description }}">
    {% if page.get('seo', {}).get('twitter_image') %}
    <meta property="twitter:image" content="{{ page.seo.twitter_image }}">
    {% endif %}
    
    <!-- Canonical URL -->
    <link rel="canonical" href="{{ site.url }}{{ page.get('seo', {}).get('canonical', '/') }}">
    
    <!-- Robots -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet"></noscript>
</head>
<body>
    <!-- Skip to Content Link for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    {% include 'components/nav.html' %}
    
    <!-- Main Content -->
    <main id="main-content">
        {% block content %}{% endblock %}
    </main>
    
    {% include 'components/footer.html' %}

    <script src="/main.js"></script>
    <script src="/analytics.js"></script>
</body>
</html>
