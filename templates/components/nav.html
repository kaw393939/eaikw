<nav class="nav">
    <div class="container">
        <div class="nav-content">
            <a href="/" class="logo">
                <div class="logo-text">
                    <span class="logo-main">EverydayAI</span>
                    <span class="logo-sub">WITH KEITH WILLIAMS</span>
                </div>
            </a>
            <div class="nav-links">
                {% for item in navigation %}
                    {% if not item.highlight %}
                    <a href="{{ item.url }}" 
                       {% if item.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
                        {{ item.title }}
                    </a>
                    {% endif %}
                {% endfor %}
                {% for item in navigation %}
                    {% if item.highlight %}
                    <a href="{{ item.url }}" 
                       class="cta-button"
                       onclick="gtag('event', 'click', {'event_category': 'cta', 'event_label': 'Nav CTA - {{ item.title }}', 'value': 1});"
                       {% if item.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
                        {{ item.title }}
                    </a>
                    {% endif %}
                {% endfor %}
            </div>
        </div>
    </div>
</nav>
